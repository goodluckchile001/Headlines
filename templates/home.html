<!doctype html>
<html lang="en">
<head>
    <title>
        Headlines
    </title>

</head>
<body>
    <form method="GET">
        <input type="text" name="publication" placeholder="search channel">
        <input type="submit" value="submit">
    </form>
    <h1>
        Headlines
    </h1>
    <h2>Current weather</h2>
    <form method="GET">
        <input type="text" name="city" placeholder="weather search">
        <input type="submit" value="submit">
    </form>
    <p>City: <b>{{weather.city}}</b></p>
    <p>{{weather.description}} | {{weather.temperature}}&#8451;</p>
    <h2>Currency</h2>

    <form>
        from: <select name="currency_from">
                {% for currency in currencies %}
                    <option value="{{currency}}" {% if currency_from == currency %} selected {% endif %} > {{currency}}</option>
                {% endfor %}
            </select>
        to: <select name="currency_to">
               {% for currency in currencies %}
                    <option value="{{currency}}" {% if currency_to == currency %} selected {% endif %} > {{currency}}</option>
                {% endfor %}
            </select>
        <input type="submit" value="Submit">
    </form>
    1 {{currency_from}} = {{currency_to}} {{rate}}
    <h2>headlines</h2>
    {% for article in articles%}
        <b><a href="{{article.link}}">{{article.title}}</a></b><br/>
    <i>
        {{article.published}}</i><br/>
    <p>{{article.summary}}</p>
    <hr/>
    {% endfor %}
</body>
</html>
